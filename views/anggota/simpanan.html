<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simpanan - Koperasi Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .saldo-card{background:linear-gradient(135deg,#1a6b3c,#2d9e5f);border-radius:20px;padding:1.5rem;color:white;margin-bottom:1.5rem;position:relative;overflow:hidden;}
    .saldo-card::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,0.08);}
    .saldo-card h6{color:rgba(255,255,255,0.7);font-size:0.85rem;margin-bottom:0.5rem;}
    .saldo-card h2{font-weight:700;font-size:1.8rem;margin-bottom:1rem;}
    .aksi-btn{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);color:white;border-radius:10px;padding:0.6rem 1.2rem;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'Poppins',sans-serif;}
    .aksi-btn:hover{background:rgba(255,255,255,0.35);}
    .trx-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:0.9rem;flex-shrink:0;}
    .nominal-quick{display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.5rem;}
    .nominal-btn{padding:0.3rem 0.8rem;border-radius:8px;border:2px solid #e8e8e8;background:white;font-size:0.78rem;font-weight:500;cursor:pointer;transition:all 0.2s;font-family:'Poppins',sans-serif;}
    .nominal-btn:hover{border-color:#2d9e5f;color:#1a6b3c;}
    .saldo-info{background:#f0f7ff;border-radius:10px;padding:0.75rem 1rem;font-size:0.85rem;color:#3b5bdb;margin-bottom:1rem;}
    .btn-setor{background:linear-gradient(135deg,#1a6b3c,#2d9e5f);border:none;border-radius:10px;color:white;padding:0.65rem 1.5rem;font-weight:600;font-family:'Poppins',sans-serif;}
    .btn-tarik{background:linear-gradient(135deg,#dc3545,#e85d6a);border:none;border-radius:10px;color:white;padding:0.65rem 1.5rem;font-weight:600;font-family:'Poppins',sans-serif;}
    @media(max-width:768px){.saldo-card h2{font-size:1.4rem;}.hide-mobile{display:none!important;}}
  </style>
</head>
<body>
  <div class="sidebar-overlay" onclick="closeSidebar()"></div>
  <div class="sidebar">
    <div class="sidebar-brand d-flex align-items-center gap-3">
      <div class="brand-icon"><i class="fa-solid fa-building-columns text-white"></i></div>
      <div><h6>Koperasi Digital</h6><small>Portal Anggota</small></div>
    </div>
    <div class="sidebar-menu">
      <div class="menu-label">Menu</div>
      <a href="/anggota/dashboard"><i class="fa-solid fa-house"></i> Dashboard</a>
      <a href="/anggota/simpanan" class="active"><i class="fa-solid fa-piggy-bank"></i> Simpanan</a>
      <a href="/anggota/pinjaman"><i class="fa-solid fa-hand-holding-dollar"></i> Pinjaman</a>
      <a href="/anggota/cicilan"><i class="fa-solid fa-calendar-check"></i> Cicilan</a>
      <a href="/anggota/profil"><i class="fa-solid fa-user"></i> Profil Saya</a>
    </div>
    <div class="sidebar-footer">
      <div class="user-info mb-2"><div class="fw-600" id="user-nama">Anggota</div><small id="user-email"></small></div>
      <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket me-2"></i>Logout</button>
    </div>
  </div>

  <div class="main-content">
    <div class="topbar">
      <div class="d-flex align-items-center gap-3">
        <button class="hamburger" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
        <div><h5>Simpanan</h5><small class="text-muted d-none d-md-block">Kelola simpanan Anda</small></div>
      </div>
    </div>

    <div class="page-content">
      <div class="saldo-card">
        <h6><i class="fa-solid fa-piggy-bank me-2"></i>Saldo Simpanan</h6>
        <h2 id="saldo">-</h2>
        <div class="d-flex gap-2 flex-wrap">
          <button class="aksi-btn" onclick="showModalSetor()"><i class="fa-solid fa-plus me-2"></i>Setor</button>
          <button class="aksi-btn" onclick="showModalTarik()"><i class="fa-solid fa-minus me-2"></i>Tarik</button>
        </div>
      </div>

      <div class="card-main">
        <div class="card-header-custom">
          <h6><i class="fa-solid fa-clock-rotate-left me-2 text-success"></i>Riwayat Transaksi</h6>
          <div class="filter-tabs">
            <button class="filter-tab active" onclick="filterJenis('',this)">Semua</button>
            <button class="filter-tab" onclick="filterJenis('setor',this)">Setor</button>
            <button class="filter-tab" onclick="filterJenis('tarik',this)">Tarik</button>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table mb-0">
            <thead><tr><th>Transaksi</th><th>Jumlah</th><th class="hide-mobile">Keterangan</th><th class="hide-mobile">Tanggal</th></tr></thead>
            <tbody id="tbl-simpanan"><tr><td colspan="4" class="text-center text-muted py-4">Memuat...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL SETOR -->
  <div class="modal fade" id="modalSetor" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title"><i class="fa-solid fa-plus text-success me-2"></i>Setor Simpanan</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <div class="saldo-info"><i class="fa-solid fa-info-circle me-1"></i>Saldo: <strong id="saldo-info-setor">-</strong></div>
          <div class="mb-3">
            <label class="form-label">Jumlah Setor</label>
            <input type="number" class="form-control" id="input-jumlah-setor" placeholder="Masukkan jumlah" min="1">
            <div class="nominal-quick">
              <button class="nominal-btn" onclick="setNominal('setor',50000)">50rb</button>
              <button class="nominal-btn" onclick="setNominal('setor',100000)">100rb</button>
              <button class="nominal-btn" onclick="setNominal('setor',200000)">200rb</button>
              <button class="nominal-btn" onclick="setNominal('setor',500000)">500rb</button>
              <button class="nominal-btn" onclick="setNominal('setor',1000000)">1jt</button>
            </div>
          </div>
          <div class="mb-3"><label class="form-label">Keterangan (opsional)</label><input type="text" class="form-control" id="input-ket-setor" placeholder="Keterangan"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Batal</button>
          <button type="button" class="btn-setor btn" onclick="prosesSetor()"><i class="fa-solid fa-check me-1"></i>Setor</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL TARIK -->
  <div class="modal fade" id="modalTarik" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title"><i class="fa-solid fa-minus text-danger me-2"></i>Tarik Simpanan</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <div class="saldo-info"><i class="fa-solid fa-info-circle me-1"></i>Saldo: <strong id="saldo-info-tarik">-</strong></div>
          <div class="mb-3">
            <label class="form-label">Jumlah Tarik</label>
            <input type="number" class="form-control" id="input-jumlah-tarik" placeholder="Masukkan jumlah" min="1">
            <div class="nominal-quick">
              <button class="nominal-btn" onclick="setNominal('tarik',50000)">50rb</button>
              <button class="nominal-btn" onclick="setNominal('tarik',100000)">100rb</button>
              <button class="nominal-btn" onclick="setNominal('tarik',200000)">200rb</button>
              <button class="nominal-btn" onclick="setNominal('tarik',500000)">500rb</button>
            </div>
          </div>
          <div class="mb-3"><label class="form-label">Keterangan (opsional)</label><input type="text" class="form-control" id="input-ket-tarik" placeholder="Keterangan"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Batal</button>
          <button type="button" class="btn-tarik btn" onclick="prosesTarik()"><i class="fa-solid fa-check me-1"></i>Tarik</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.25/dist/sweetalert2.all.min.js"></script>
  <script src="/js/main.js"></script>
  <script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    if (!token || !user || user.role !== 'anggota') window.location.href = '/';
    document.getElementById('user-nama').textContent = user?.nama || 'Anggota';
    document.getElementById('user-email').textContent = user?.email || '';

    let dataSimpanan = [], currentSaldo = 0;

    async function loadSaldo() {
      try {
        const res = await fetch('/api/simpanan/saldo', { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();
        currentSaldo = Number(data.saldo);
        document.getElementById('saldo').textContent = rupiah(currentSaldo);
        document.getElementById('saldo-info-setor').textContent = rupiah(currentSaldo);
        document.getElementById('saldo-info-tarik').textContent = rupiah(currentSaldo);
      } catch(err) { console.error(err); }
    }

    async function loadSimpanan() {
      try {
        const res = await fetch('/api/simpanan', { headers: { 'Authorization': `Bearer ${token}` } });
        dataSimpanan = await res.json();
        renderTable(dataSimpanan);
      } catch(err) { console.error(err); }
    }

    function renderTable(data) {
      const tbody = document.getElementById('tbl-simpanan');
      if (data.length === 0) { tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">Belum ada transaksi</td></tr>'; return; }
      tbody.innerHTML = data.map(s => `
        <tr>
          <td>
            <div class="d-flex align-items-center gap-2">
              <div class="trx-icon" style="background:${s.jenis==='setor'?'#e8f5ee':'#fde8e8'};color:${s.jenis==='setor'?'#1a6b3c':'#dc3545'};"><i class="fa-solid fa-${s.jenis==='setor'?'arrow-trend-up':'arrow-trend-down'}"></i></div>
              <div>
                <span class="badge ${s.jenis==='setor'?'bg-success':'bg-danger'}">${s.jenis}</span>
                <div class="d-md-none"><small class="text-muted">${new Date(s.tanggal).toLocaleDateString('id-ID')}</small></div>
              </div>
            </div>
          </td>
          <td><strong style="color:${s.jenis==='setor'?'#1a6b3c':'#dc3545'};">${s.jenis==='tarik'?'-':'+'}${rupiah(s.jumlah)}</strong></td>
          <td class="hide-mobile"><small>${s.keterangan||'-'}</small></td>
          <td class="hide-mobile"><small>${new Date(s.tanggal).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'})}</small></td>
        </tr>`).join('');
    }

    function filterJenis(jenis, el) {
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      renderTable(jenis ? dataSimpanan.filter(s => s.jenis === jenis) : dataSimpanan);
    }

    function setNominal(type, amount) { document.getElementById(`input-jumlah-${type}`).value = amount; }

    function showModalSetor() {
      document.getElementById('input-jumlah-setor').value = '';
      document.getElementById('input-ket-setor').value = '';
      new bootstrap.Modal(document.getElementById('modalSetor')).show();
    }

    function showModalTarik() {
      document.getElementById('input-jumlah-tarik').value = '';
      document.getElementById('input-ket-tarik').value = '';
      new bootstrap.Modal(document.getElementById('modalTarik')).show();
    }

    async function prosesSetor() {
      const jumlah = document.getElementById('input-jumlah-setor').value;
      const keterangan = document.getElementById('input-ket-setor').value;
      if (!jumlah || jumlah <= 0) return Swal.fire('Peringatan','Masukkan jumlah yang valid!','warning');
      try {
        const res = await fetch('/api/simpanan/setor',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify({jumlah:Number(jumlah),keterangan})});
        const data = await res.json();
        if (res.ok) { bootstrap.Modal.getInstance(document.getElementById('modalSetor')).hide(); await Swal.fire({icon:'success',title:'Berhasil!',text:data.message,timer:1500,showConfirmButton:false}); loadSaldo(); loadSimpanan(); }
        else Swal.fire('Gagal',data.message,'error');
      } catch(err) { Swal.fire('Error','Terjadi kesalahan server.','error'); }
    }

    async function prosesTarik() {
      const jumlah = document.getElementById('input-jumlah-tarik').value;
      const keterangan = document.getElementById('input-ket-tarik').value;
      if (!jumlah || jumlah <= 0) return Swal.fire('Peringatan','Masukkan jumlah yang valid!','warning');
      if (Number(jumlah) > currentSaldo) return Swal.fire('Gagal',`Saldo tidak cukup! Saldo Anda: ${rupiah(currentSaldo)}`,'error');
      try {
        const res = await fetch('/api/simpanan/tarik',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify({jumlah:Number(jumlah),keterangan})});
        const data = await res.json();
        if (res.ok) { bootstrap.Modal.getInstance(document.getElementById('modalTarik')).hide(); await Swal.fire({icon:'success',title:'Berhasil!',text:data.message,timer:1500,showConfirmButton:false}); loadSaldo(); loadSimpanan(); }
        else Swal.fire('Gagal',data.message,'error');
      } catch(err) { Swal.fire('Error','Terjadi kesalahan server.','error'); }
    }

    loadSaldo(); loadSimpanan();
  </script>
</body>
</html>
