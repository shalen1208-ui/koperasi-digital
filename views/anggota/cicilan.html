<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cicilan - Koperasi Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .progress-card{background:white;border-radius:16px;padding:1.5rem;box-shadow:0 2px 15px rgba(0,0,0,0.05);margin-bottom:1.5rem;}
    .progress-card h6{font-weight:700;color:#1a1a2e;margin-bottom:1rem;}
    .progress{height:10px;border-radius:10px;background:#f0f4f8;}
    .progress-bar{border-radius:10px;background:linear-gradient(90deg,#1a6b3c,#2d9e5f);}
    .summary-row{display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:1rem;}
    .summary-item{flex:1;min-width:100px;background:#f8fafc;border-radius:10px;padding:0.75rem;text-align:center;}
    .summary-item p{color:#888;font-size:0.72rem;margin:0 0 0.2rem;}
    .summary-item h5{font-weight:700;font-size:0.95rem;margin:0;}
    .cicilan-card{margin:0 1rem 0.75rem;border-radius:12px;border:1px solid #f0f4f8;overflow:hidden;transition:all 0.2s;}
    .cicilan-card:hover{box-shadow:0 4px 15px rgba(0,0,0,0.08);}
    .cicilan-card.terlambat{border-color:#fde8e8;}
    .cicilan-card.lunas{border-color:#e8f5ee;opacity:0.85;}
    .cicilan-header{padding:0.875rem 1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;}
    .cicilan-header.terlambat{background:#fff8f8;}
    .cicilan-header.lunas{background:#f8fff8;}
    .cicilan-header.belum_bayar{background:#fffdf0;}
    .cicilan-ke{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;flex-shrink:0;}
    .btn-bayar{background:linear-gradient(135deg,#1a6b3c,#2d9e5f);border:none;border-radius:8px;color:white;padding:0.4rem 0.9rem;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'Poppins',sans-serif;white-space:nowrap;}
    .btn-bayar:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(26,107,60,0.3);}
    .kosong-container{text-align:center;padding:2.5rem 1.5rem;background:linear-gradient(135deg,#f0f7ff,#e8f0ff);border-radius:16px;border:1px dashed #d0e4ff;margin-bottom:1.5rem;display:flex;flex-direction:column;align-items:center;}
    .kosong-container i{font-size:3rem;color:#3b5bdb;opacity:0.4;display:block;margin-bottom:1rem;}
    .kosong-container h6{color:#3b5bdb;font-weight:700;margin-bottom:0.5rem;}
    .kosong-container p{color:#888;font-size:0.875rem;margin-bottom:1.5rem;}
    .btn-ke-pinjaman{display:inline-block;background:#3b5bdb;border-radius:8px;color:white;padding:0.6rem 1.5rem;font-weight:600;font-size:0.875rem;text-decoration:none;font-family:'Poppins',sans-serif;transition:all 0.2s;width:fit-content;white-space:nowrap;}
    .btn-ke-pinjaman:hover{background:#2f4abf;color:white;}
    .btn-ke-pinjaman i{font-size:0.875rem!important;width:auto!important;height:auto!important;}
  </style>
</head>
<body>
  <div class="sidebar-overlay" onclick="closeSidebar()"></div>
  <div class="sidebar">
    <div class="sidebar-brand d-flex align-items-center gap-3">
      <div class="brand-icon"><i class="fa-solid fa-building-columns text-white"></i></div>
      <div><h6>Koperasi Digital</h6><small>Portal Anggota</small></div>
    </div>
    <div class="sidebar-menu">
      <div class="menu-label">Menu</div>
      <a href="/anggota/dashboard"><i class="fa-solid fa-house"></i> Dashboard</a>
      <a href="/anggota/simpanan"><i class="fa-solid fa-piggy-bank"></i> Simpanan</a>
      <a href="/anggota/pinjaman"><i class="fa-solid fa-hand-holding-dollar"></i> Pinjaman</a>
      <a href="/anggota/cicilan" class="active"><i class="fa-solid fa-calendar-check"></i> Cicilan</a>
    </div>
    <div class="sidebar-footer">
      <div class="user-info mb-2"><div class="fw-600" id="user-nama">Anggota</div><small id="user-email"></small></div>
      <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket me-2"></i>Logout</button>
    </div>
  </div>

  <div class="main-content">
    <div class="topbar">
      <div class="d-flex align-items-center gap-3">
        <button class="hamburger" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
        <div><h5>Cicilan</h5><small class="text-muted d-none d-md-block">Pantau dan bayar cicilan</small></div>
      </div>
    </div>

    <div class="page-content">
      <div id="progress-section"></div>
      <div class="card-main">
        <div class="card-header-custom">
          <h6><i class="fa-solid fa-calendar-check me-2 text-success"></i>Daftar Cicilan</h6>
          <div class="filter-tabs">
            <button class="filter-tab active" onclick="filterStatus('',this)">Semua</button>
            <button class="filter-tab" onclick="filterStatus('belum_bayar',this)">Belum Bayar</button>
            <button class="filter-tab" onclick="filterStatus('terlambat',this)">Terlambat</button>
            <button class="filter-tab" onclick="filterStatus('lunas',this)">Lunas</button>
          </div>
        </div>
        <div class="py-3" id="cicilan-container">
          <div class="text-center text-muted py-4">Memuat...</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.25/dist/sweetalert2.all.min.js"></script>
  <script src="/js/main.js"></script>
  <script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    if (!token || !user || user.role !== 'anggota') window.location.href = '/';
    document.getElementById('user-nama').textContent = user?.nama || 'Anggota';
    document.getElementById('user-email').textContent = user?.email || '';

    let dataCicilan = [];

    async function loadCicilan() {
      try {
        const res = await fetch('/api/cicilan', { headers: { 'Authorization': `Bearer ${token}` } });
        dataCicilan = await res.json();

        if (dataCicilan.length === 0) {
          document.getElementById('progress-section').innerHTML = `
            <div class="kosong-container">
              <i class="fa-solid fa-calendar-xmark"></i>
              <h6>Belum Ada Cicilan</h6>
              <p>Anda belum memiliki pinjaman aktif.<br>Ajukan pinjaman terlebih dahulu.</p>
              <a href="/anggota/pinjaman" class="btn-ke-pinjaman">Ajukan Pinjaman</a>
            </div>`;
          document.getElementById('cicilan-container').innerHTML = '<div class="empty-state"><i class="fa-solid fa-calendar-check"></i><p>Tidak ada cicilan</p></div>';
          return;
        }

        const totalCicilan = dataCicilan.length;
        const lunas = dataCicilan.filter(c => c.status==='lunas').length;
        const terlambat = dataCicilan.filter(c => c.status==='terlambat').length;
        const belumBayar = dataCicilan.filter(c => c.status==='belum_bayar').length;
        const totalTagihan = dataCicilan.reduce((s,c) => s+Number(c.jumlah),0);
        const totalLunas = dataCicilan.filter(c=>c.status==='lunas').reduce((s,c)=>s+Number(c.jumlah),0);
        const sisaTagihan = totalTagihan - totalLunas;
        const persen = Math.round((lunas/totalCicilan)*100);

        document.getElementById('progress-section').innerHTML = `
          <div class="progress-card">
            <h6><i class="fa-solid fa-chart-pie me-2 text-success"></i>Progress Pelunasan</h6>
            <div class="summary-row">
              <div class="summary-item"><p>Total</p><h5>${totalCicilan} kali</h5></div>
              <div class="summary-item"><p>Lunas</p><h5 class="text-success">${lunas}</h5></div>
              <div class="summary-item"><p>Belum Bayar</p><h5 class="text-warning">${belumBayar}</h5></div>
              <div class="summary-item"><p>Terlambat</p><h5 class="text-danger">${terlambat}</h5></div>
              <div class="summary-item"><p>Sisa</p><h5 class="text-danger" style="font-size:0.8rem;">${rupiah(sisaTagihan)}</h5></div>
            </div>
            <div class="d-flex justify-content-between mb-1" style="font-size:0.8rem;">
              <span class="text-muted">Progress</span><span class="fw-600 text-success">${persen}%</span>
            </div>
            <div class="progress"><div class="progress-bar" style="width:${persen}%"></div></div>
          </div>`;

        renderCicilan(dataCicilan);
      } catch(err) { console.error(err); }
    }

    function filterStatus(status, el) {
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      renderCicilan(status ? dataCicilan.filter(c => c.status === status) : dataCicilan);
    }

    function renderCicilan(data) {
      const container = document.getElementById('cicilan-container');
      if (data.length === 0) { container.innerHTML = '<div class="empty-state"><i class="fa-solid fa-calendar-check"></i><p>Tidak ada cicilan di kategori ini</p></div>'; return; }
      const isLunas = s => s === 'lunas';
      const isLate = s => s === 'terlambat';
      container.innerHTML = data.map(c => {
        const iconColor = isLunas(c.status)?'#1a6b3c':isLate(c.status)?'#dc3545':'#f57c00';
        const bgColor = isLunas(c.status)?'#e8f5ee':isLate(c.status)?'#fde8e8':'#fff3e0';
        const badgeClass = isLunas(c.status)?'bg-success':isLate(c.status)?'bg-danger':'bg-warning';
        const badgeLabel = isLunas(c.status)?'✓ Lunas':isLate(c.status)?'⚠ Terlambat':'⏳ Belum Bayar';
        return `
          <div class="cicilan-card ${c.status}">
            <div class="cicilan-header ${c.status}">
              <div class="d-flex align-items-center gap-2">
                <div class="cicilan-ke" style="background:${bgColor};color:${iconColor};">${c.ke}</div>
                <div>
                  <div style="font-weight:600;font-size:0.875rem;">Cicilan ke-${c.ke}</div>
                  <small class="text-muted">Jatuh tempo: ${new Date(c.tanggal_jatuh_tempo).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'})}</small>
                </div>
              </div>
              <div class="d-flex align-items-center gap-2">
                <div class="text-end">
                  <div style="font-weight:700;">${rupiah(c.jumlah)}</div>
                  <span class="badge ${badgeClass}">${badgeLabel}</span>
                </div>
                ${!isLunas(c.status)?`<button class="btn-bayar" onclick="bayarCicilan(${c.id},${c.ke},${c.jumlah})"><i class="fa-solid fa-credit-card me-1"></i>Bayar</button>`:`<div style="color:#1a6b3c;font-size:1.5rem;"><i class="fa-solid fa-circle-check"></i></div>`}
              </div>
            </div>
            ${isLunas(c.status)&&c.tanggal_bayar?`<div style="padding:0.5rem 1rem;font-size:0.78rem;color:#888;background:#f8f9fa;border-top:1px solid #f0f4f8;"><i class="fa-solid fa-clock me-1"></i>Dibayar: ${new Date(c.tanggal_bayar).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'})}</div>`:''}
          </div>`;
      }).join('');
    }

    async function bayarCicilan(id, ke, jumlah) {
      const result = await Swal.fire({title:`Bayar Cicilan ke-${ke}?`,html:`Jumlah: <strong>${rupiah(jumlah)}</strong>`,icon:'question',showCancelButton:true,confirmButtonColor:'#1a6b3c',cancelButtonColor:'#6c757d',confirmButtonText:'Ya, Bayar!',cancelButtonText:'Batal'});
      if (result.isConfirmed) {
        try {
          const res = await fetch(`/api/cicilan/${id}/bayar`,{method:'POST',headers:{'Authorization':`Bearer ${token}`}});
          const data = await res.json();
          if (res.ok) { await Swal.fire({icon:'success',title:'Berhasil!',text:data.message,timer:2000,showConfirmButton:false}); loadCicilan(); }
          else Swal.fire('Gagal',data.message,'error');
        } catch(err) { Swal.fire('Error','Terjadi kesalahan server.','error'); }
      }
    }

    loadCicilan();
  </script>
</body>
</html>
