<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Koperasi Digital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        * { font-family: 'Poppins', sans-serif; }
        body { min-height: 100vh; background: linear-gradient(135deg, #1a6b3c 0%, #2d9e5f 50%, #1a6b3c 100%); display: flex; align-items: center; justify-content: center; }
        .login-wrapper { width: 100%; max-width: 420px; padding: 1rem; }
        .login-card { background: #fff; border-radius: 20px; padding: 2.5rem; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .logo-area { text-align: center; margin-bottom: 2rem; }
        .logo-icon { width: 70px; height: 70px; background: linear-gradient(135deg, #1a6b3c, #2d9e5f); border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; box-shadow: 0 8px 20px rgba(26,107,60,0.3); }
        .logo-icon i { font-size: 2rem; color: white; }
        .logo-area h4 { color: #1a6b3c; font-weight: 700; margin-bottom: 0.2rem; }
        .logo-area p { color: #888; font-size: 0.85rem; margin: 0; }
        .form-label { font-weight: 500; color: #444; font-size: 0.9rem; }
        .form-control { border-radius: 10px; border: 2px solid #e8e8e8; padding: 0.65rem 1rem; font-size: 0.9rem; transition: all 0.3s; }
        .form-control:focus { border-color: #2d9e5f; box-shadow: 0 0 0 0.2rem rgba(45,158,95,0.15); }
        .input-group .form-control { border-right: none; }
        .input-group-text { border-radius: 0 10px 10px 0; border: 2px solid #e8e8e8; border-left: none; background: white; cursor: pointer; color: #888; }
        .input-group:focus-within .input-group-text { border-color: #2d9e5f; }
        .btn-login { background: linear-gradient(135deg, #1a6b3c, #2d9e5f); border: none; border-radius: 10px; padding: 0.75rem; font-weight: 600; font-size: 0.95rem; letter-spacing: 0.5px; transition: all 0.3s; box-shadow: 0 4px 15px rgba(26,107,60,0.3); }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(26,107,60,0.4); }
        .btn-login:active { transform: translateY(0); }
        .divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; }
        .divider hr { flex: 1; margin: 0; border-color: #e8e8e8; }
        .divider span { color: #aaa; font-size: 0.8rem; }
        .register-link { text-align: center; font-size: 0.875rem; color: #888; }
        .register-link a { color: #1a6b3c; font-weight: 600; text-decoration: none; }
        .register-link a:hover { text-decoration: underline; }
        .alert { border-radius: 10px; font-size: 0.875rem; }
        .spinner-border-sm { width: 1rem; height: 1rem; }
        .lupa-pw { color: #1a6b3c; font-size: 0.85rem; text-decoration: none; font-weight: 500; }
        .lupa-pw:hover { text-decoration: underline; color: #1a6b3c; }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fa-solid fa-building-columns"></i>
                </div>
                <h4>Koperasi Digital</h4>
                <p>Sistem Manajemen Koperasi Modern</p>
            </div>

            <div id="alert-box" class="alert d-none" role="alert"></div>

            <form id="login-form">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="Masukkan email Anda" required>
                </div>

                <div class="mb-2">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="password" placeholder="Masukkan password Anda" required>
                        <span class="input-group-text" onclick="togglePassword()">
                            <i class="fa-solid fa-eye" id="eye-icon"></i>
                        </span>
                    </div>
                </div>

                <!-- LUPA PASSWORD LINK -->
                <div class="text-end mb-3">
                    <a href="#" class="lupa-pw" onclick="showModalLupaPassword()">Lupa password?</a>
                </div>

                <button type="submit" class="btn btn-login btn-primary w-100 text-white" id="btn-login">
                    <span id="btn-text">Masuk</span>
                    <span id="btn-spinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status"></span>
                </button>
            </form>

            <div class="divider">
                <hr><span>atau</span><hr>
            </div>

            <div class="register-link">
                Belum punya akun? <a href="/register">Daftar sekarang</a>
            </div>
        </div>
    </div>

    <!-- MODAL LUPA PASSWORD -->
    <div class="modal fade" id="modalLupaPassword" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius:16px;border:none;">
                <div class="modal-header" style="border-bottom:1px solid #f0f4f8;padding:1.25rem 1.5rem;">
                    <h5 class="modal-title" style="font-weight:700;font-size:1rem;">
                        <i class="fa-solid fa-lock text-success me-2"></i>Lupa Password
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" style="padding:1.5rem;">
                    <p style="color:#666;font-size:0.875rem;">Masukkan email Anda, lalu hubungi admin untuk reset password.</p>
                    <div class="mb-3">
                        <label style="font-weight:500;color:#444;font-size:0.9rem;">Email</label>
                        <input type="email" class="form-control" id="lp-email" placeholder="Masukkan email Anda">
                    </div>
                    <div class="alert alert-warning" style="font-size:0.825rem;border-radius:10px;">
                        <i class="fa-solid fa-circle-info me-1"></i>
                        Hubungi admin koperasi untuk mereset password Anda dengan menyebutkan email di atas.
                    </div>
                </div>
                <div class="modal-footer" style="border-top:1px solid #f0f4f8;">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Tutup</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.25/dist/sweetalert2.all.min.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        if (token && user) {
            if (user.role === 'admin') window.location.href = '/admin/dashboard';
            else window.location.href = '/anggota/dashboard';
        }

        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            if (pwd.type === 'password') { pwd.type = 'text'; icon.classList.replace('fa-eye','fa-eye-slash'); }
            else { pwd.type = 'password'; icon.classList.replace('fa-eye-slash','fa-eye'); }
        }

        function showAlert(message, type='danger') {
            const box = document.getElementById('alert-box');
            box.className = `alert alert-${type}`;
            box.textContent = message;
            box.classList.remove('d-none');
        }

        function showModalLupaPassword() {
            document.getElementById('lp-email').value = '';
            new bootstrap.Modal(document.getElementById('modalLupaPassword')).show();
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');
            const btnLogin = document.getElementById('btn-login');

            btnText.textContent = 'Memproses...';
            btnSpinner.classList.remove('d-none');
            btnLogin.disabled = true;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    await Swal.fire({ icon:'success', title:'Login Berhasil!', text:`Selamat datang, ${data.user.nama}!`, timer:1500, showConfirmButton:false });
                    if (data.user.role === 'admin') window.location.href = '/admin/dashboard';
                    else window.location.href = '/anggota/dashboard';
                } else {
                    showAlert(data.message || 'Login gagal. Periksa email dan password Anda.');
                    btnText.textContent = 'Masuk';
                    btnSpinner.classList.add('d-none');
                    btnLogin.disabled = false;
                }
            } catch(err) {
                showAlert('Terjadi kesalahan. Coba lagi nanti.');
                btnText.textContent = 'Masuk';
                btnSpinner.classList.add('d-none');
                btnLogin.disabled = false;
            }
        });
    </script>
</body>
</html>
